; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:heltec_wifi_lora_32_V3]
platform = espressif32 @ 6.4.0
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
; Adds a dedicated 64 KB "cfgdata" NVS partition for this project's own
; config (reclaimed from the unused default spiffs partition), instead of
; growing the stock "nvs" partition — see partitions.csv for why. app0/app1
; deliberately keep their stock offsets (cfgdata sits where spiffs used to,
; after app0/app1), so no board_upload.offset_address override is needed.
board_build.partitions = partitions.csv
extra_scripts =
    pre:tools/version.py
build_flags =
    -D MQTT_MAX_PACKET_SIZE=1024
lib_deps =
	jgromes/RadioLib@^7.6.0
	ropg/Heltec_ESP32_LoRa_v3@^0.9.2
	electroniccats/CayenneLPP@^1.6.1
    tzapu/WiFiManager @ ^2.0.16-rc.2
	ropg/LoRaWAN_ESP32@^1.2.0
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.15
    adafruit/Adafruit BusIO @ ^1.16.1
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^4.0.6
    tzapu/WiFiManager @ ^2.0.16-rc.2
    bblanchon/ArduinoJson @ ^7.2.0
    knolleary/PubSubClient @ ^2.8